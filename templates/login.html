<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>文化遗产图像智能修复平台 - 登录</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="center-wrapper">
    <div class="platform-title">文化遗产图像智能修复系统</div>
    <form class="login-container" method="POST" action="/login">
      <h2>用户登录</h2>
      <input type="text" name="username" placeholder="请输入登录ID" class="input" required>
      <input type="password" name="password" placeholder="请输入密码" class="input" required>
      <div class="options">
        <label><input type="checkbox"> 记住密码</label>
        <a href="#" class="forgot">忘记密码？</a>
      </div>
      <button type="submit" class="login-btn">登 录</button>
    </form>
  </div>

  <script>
    document.querySelector('.login-btn').addEventListener('click', function (e) {
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty('--x', `${e.clientX - rect.left}px`);
      btn.style.setProperty('--y', `${e.clientY - rect.top}px`);
    });
  </script>
</body>
</html>
